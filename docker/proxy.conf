# Reverse proxy for docker-compose: one origin in front of both
# services. /api/* goes to the Flask backend, everything else to the
# React Router (SSR) server. Same-origin => the session cookie works
# with no CORS or cross-site cookie config (same idea as the
# frontend's Vite dev proxy).
server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # allow websocket upgrades (harmless for the prod build)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
